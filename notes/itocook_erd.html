
<style>
#erd { padding: 1rem 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#444441' : '#F1EFE8',
  },
});

const diagram = `erDiagram
  directus_users {
    uuid id PK
    string email
    string first_name
    string last_name
    string department
    uuid avatar FK
  }
  recipes {
    uuid id PK
    string dish_name
    string category
    text description
    json ingredients
    json steps
    uuid photo FK
    uuid cook FK
    uuid source_cook_queue FK
    uuid forked_from FK
    int pasta_packages
    int servings
  }
  cook_queue {
    uuid id PK
    date date
    string dish_name
    string category
    string status
    uuid cook FK
    uuid recipe FK
  }
  orders {
    uuid id PK
    string status
    uuid user FK
    uuid cook_queue FK
  }
  balances {
    uuid id PK
    decimal amount
    uuid user FK
  }
  transactions {
    uuid id PK
    decimal amount
    string type
    text description
    timestamp date
    uuid user FK
  }
  recipe_likes {
    uuid id PK
    uuid recipe FK
    uuid user FK
  }
  shopping_list_items {
    int id PK
    uuid user FK
    uuid recipe FK
    string ingredient_name
    decimal amount
    string unit
    string emoji
    boolean is_checked
    date cook_date
  }
  cleaning_schedule {
    uuid id PK
    date date
    string department
    boolean confirmed
    uuid user FK
  }
  app_settings {
    uuid id PK
    decimal pasta_package_price
  }
  directus_files {
    uuid id PK
    string filename_disk
    string type
  }

  directus_users ||--o{ recipes : "creates"
  directus_users ||--o{ cook_queue : "assigned as cook"
  directus_users ||--o{ orders : "joins meal"
  directus_users ||--|| balances : "has balance"
  directus_users ||--o{ transactions : "has transactions"
  directus_users ||--o{ recipe_likes : "likes"
  directus_users ||--o{ shopping_list_items : "owns items"
  directus_users ||--o{ cleaning_schedule : "assigned duty"
  directus_users }o--o| directus_files : "avatar"

  recipes }o--o| recipes : "forked from"
  recipes }o--o| cook_queue : "source queue"
  recipes ||--o{ recipe_likes : "liked by"
  recipes ||--o{ shopping_list_items : "ingredients from"

  cook_queue }o--o| recipes : "linked recipe"
  cook_queue ||--o{ orders : "has participants"

  directus_files ||--o{ recipes : "photo"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
